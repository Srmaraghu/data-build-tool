version: 2

models:
  - name: silver_returns
    columns:
      - name: category
        data_tests:
          - not_null

      - name: return_reason
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Damaged', 'Defective', 'Late Delivery', 'Wrong Item', 'Changed Mind']

      - name: total_returned_qty
        data_tests:
          - not_null
          - test_generic_non_negative

      - name: total_refund_amount
        data_tests:
          - not_null
          - test_generic_non_negative

      - name: total_return_records
        data_tests:
          - not_null
          - test_generic_non_negative